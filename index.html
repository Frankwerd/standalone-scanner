<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGRIP.AI Terminal v3.0 - Serialized Terminal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        .scan-region-highlight { border: 2px solid #f97316 !important; border-radius: 1rem !important; }
        .tab-active { color: #f97316; border-bottom: 2px solid #f97316; }
        #reader video { border-radius: 1.5rem; }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-xl mx-auto space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-black tracking-tighter text-orange-500 uppercase italic">GGRIP.AI Terminal</h1>
            <p class="text-[10px] text-slate-400 font-bold tracking-[0.3em] uppercase">Serialized Lifecycle Terminal</p>
        </header>

        <!-- Config Section -->
        <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl space-y-4">
            <button onclick="toggleConfig()" class="w-full flex items-center justify-between text-slate-400 hover:text-orange-500 transition-colors">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">settings</span>
                    <h2 class="text-[10px] font-black uppercase tracking-widest">System Environment Config</h2>
                </div>
                <span id="configChevron" class="material-symbols-outlined transition-transform">expand_more</span>
            </button>
            <div id="configContent" class="hidden space-y-3 pt-2">
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Google Script URL</label>
                    <input type="url" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec"
                           class="w-full bg-black border-none rounded-lg p-3 text-xs focus:ring-1 focus:ring-orange-500 transition-all outline-none">
                </div>
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">OMS API Token</label>
                    <input type="password" id="apiToken" placeholder="Enter Token..."
                           class="w-full bg-black border-none rounded-lg p-3 text-xs focus:ring-1 focus:ring-orange-500 transition-all outline-none">
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-slate-700">
            <button onclick="switchTab('production')" id="tab-production" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all tab-active">FG Assembly & Binding</button>
            <button onclick="switchTab('shipping')" id="tab-shipping" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all text-slate-500">Outbound Fulfillment</button>
            <button onclick="switchTab('restock')" id="tab-restock" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all text-slate-500">Restock</button>
        </div>

        <!-- Scanner Viewport (Hidden until triggered) -->
        <div id="scannerContainer" class="hidden space-y-4 animate-in fade-in zoom-in duration-300">
            <div class="relative group">
                <div id="reader" class="rounded-3xl overflow-hidden border-2 border-orange-500 bg-black shadow-2xl min-h-[300px] w-full"></div>
                <div class="absolute inset-0 pointer-events-none flex items-center justify-center z-20">
                    <div class="text-[10px] font-black text-white bg-black/60 px-4 py-2 rounded-full uppercase tracking-widest border border-white/20 shadow-2xl backdrop-blur-sm">Align Barcode in Box</div>
                </div>
                <button onclick="stopScanner()" class="absolute top-4 right-4 bg-red-600/80 hover:bg-red-600 text-white p-2 rounded-full shadow-lg backdrop-blur-sm transition-all z-30">
                    <span class="material-symbols-outlined text-sm">close</span>
                </button>
            </div>
        </div>

        <!-- Production Content -->
        <div id="content-production" class="space-y-4">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl space-y-6">
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Target SKU</label>
                        <div class="flex gap-2">
                            <input type="text" id="prod-sku" readonly placeholder="SCAN SKU..."
                                   class="flex-1 bg-black border-none rounded-xl p-4 text-sm font-mono tracking-wider outline-none uppercase placeholder:text-slate-700">
                            <button onclick="startTargetedScan('prod-sku')" class="bg-orange-600 hover:bg-orange-500 text-white px-4 rounded-xl transition-all active:scale-95 flex items-center">
                                <span class="material-symbols-outlined">qr_code_scanner</span>
                            </button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Serial Number</label>
                        <div class="flex gap-2">
                            <input type="text" id="prod-sn" readonly placeholder="ASSIGN S/N..."
                                   class="flex-1 bg-black border-none rounded-xl p-4 text-sm font-mono tracking-wider outline-none uppercase placeholder:text-slate-700">
                            <button onclick="startTargetedScan('prod-sn')" class="bg-orange-600 hover:bg-orange-500 text-white px-4 rounded-xl transition-all active:scale-95 flex items-center">
                                <span class="material-symbols-outlined">barcode_scanner</span>
                            </button>
                        </div>
                    </div>
                </div>
                <button id="btn-submit-production" disabled onclick="submitProduction()" class="w-full bg-slate-700 text-slate-500 p-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    Submit FG Assembly & Binding
                </button>
            </div>
        </div>

        <!-- Shipping Content -->
        <div id="content-shipping" class="hidden space-y-4">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl space-y-6">
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Order ID (from Label)</label>
                        <div class="flex gap-2">
                            <input type="text" id="ship-order" readonly placeholder="SCAN LABEL..."
                                   class="flex-1 bg-black border-none rounded-xl p-4 text-sm font-mono tracking-wider outline-none uppercase placeholder:text-slate-700">
                            <button onclick="startTargetedScan('ship-order')" class="bg-orange-600 hover:bg-orange-500 text-white px-4 rounded-xl transition-all active:scale-95 flex items-center">
                                <span class="material-symbols-outlined">qr_code_scanner</span>
                            </button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Serial Number</label>
                        <div class="flex gap-2">
                            <input type="text" id="ship-sn" readonly placeholder="SCAN PRODUCT S/N..."
                                   class="flex-1 bg-black border-none rounded-xl p-4 text-sm font-mono tracking-wider outline-none uppercase placeholder:text-slate-700">
                            <button onclick="startTargetedScan('ship-sn')" class="bg-orange-600 hover:bg-orange-500 text-white px-4 rounded-xl transition-all active:scale-95 flex items-center">
                                <span class="material-symbols-outlined">barcode_scanner</span>
                            </button>
                        </div>
                    </div>
                </div>
                <button id="btn-submit-shipping" disabled onclick="submitShipping()" class="w-full bg-slate-700 text-slate-500 p-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    Process Outbound Fulfillment
                </button>
            </div>
        </div>

        <!-- Restock Content -->
        <div id="content-restock" class="hidden space-y-4">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Target SKU</label>
                        <div class="flex gap-2">
                            <input type="text" id="restock-sku" readonly placeholder="SCAN SKU..."
                                   class="flex-1 bg-black border-none rounded-xl p-4 text-sm font-mono tracking-wider outline-none uppercase placeholder:text-slate-700">
                            <button onclick="startTargetedScan('restock-sku')" class="bg-orange-600 hover:bg-orange-500 text-white px-4 rounded-xl transition-all active:scale-95 flex items-center">
                                <span class="material-symbols-outlined text-xs">qr_code_scanner</span>
                            </button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Unit Count</label>
                        <input type="number" id="restock-qty" value="1" min="1"
                               class="w-full bg-black border-none rounded-xl p-4 text-sm font-bold focus:ring-1 focus:ring-orange-500 outline-none text-center">
                    </div>
                </div>
                <button id="btn-submit-restock" disabled onclick="submitRestock()" class="w-full bg-slate-700 text-slate-500 p-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    Update Supply Stock
                </button>
            </div>
        </div>

        <!-- Status Panel -->
        <div id="status" class="text-center p-5 rounded-2xl bg-slate-800 border-2 border-transparent text-[11px] font-black tracking-[0.2em] hidden shadow-inner"></div>

        <!-- Diagnosis / Footer -->
        <div class="text-center text-[9px] text-slate-500 font-bold uppercase tracking-widest opacity-50">
            GGRIP.AI Ecosystem // Developed by: Francis J. LiButti
        </div>
    </div>

    <script>
        let html5QrCode = null;
        let activeTarget = null;

        window.onload = () => {
            const savedUrl = localStorage.getItem('kinetic_script_url');
            const savedToken = localStorage.getItem('kinetic_api_token');
            if (savedUrl) document.getElementById('scriptUrl').value = savedUrl;
            if (savedToken) document.getElementById('apiToken').value = savedToken;
        };

        function toggleConfig() {
            const content = document.getElementById('configContent');
            const chevron = document.getElementById('configChevron');
            content.classList.toggle('hidden');
            chevron.style.transform = content.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function switchTab(tab) {
            document.getElementById('content-production').classList.toggle('hidden', tab !== 'production');
            document.getElementById('content-shipping').classList.toggle('hidden', tab !== 'shipping');
            document.getElementById('content-restock').classList.toggle('hidden', tab !== 'restock');

            document.getElementById('tab-production').classList.toggle('tab-active', tab === 'production');
            document.getElementById('tab-shipping').classList.toggle('tab-active', tab === 'shipping');
            document.getElementById('tab-restock').classList.toggle('tab-active', tab === 'restock');

            document.getElementById('tab-production').classList.toggle('text-slate-500', tab !== 'production');
            document.getElementById('tab-shipping').classList.toggle('text-slate-500', tab !== 'shipping');
            document.getElementById('tab-restock').classList.toggle('text-slate-500', tab !== 'restock');

            stopScanner();
        }

        async function startTargetedScan(targetId) {
            const url = document.getElementById('scriptUrl').value.trim();
            const token = document.getElementById('apiToken').value.trim();

            if (!url || !token) {
                showStatus("ERROR: CONFIG REQUIRED", "error");
                toggleConfig();
                return;
            }

            if (html5QrCode) await stopScanner();

            activeTarget = targetId;
            document.getElementById('scannerContainer').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");

            const config = {
                fps: 20,
                qrbox: { width: 350, height: 150 }, // Optimized for Code 128
                aspectRatio: 1.777778,
                disableShading: false,
                useBarCodeDetectorIfSupported: false,
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.QR_CODE,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39
                ]
            };

            const onSuccess = (decodedText) => {
                document.getElementById(activeTarget).value = decodedText;
                if (navigator.vibrate) navigator.vibrate(100);
                showStatus(`CAPTURED: ${decodedText}`, "success");
                stopScanner();
                validateButtons();
            };

            try {
                document.getElementById('scannerContainer').scrollIntoView({ behavior: 'smooth' });
                await html5QrCode.start({ facingMode: "environment" }, config, onSuccess);
            } catch (err) {
                console.error("Scanner error:", err);
                showStatus(`CAMERA ERROR: ${err.name}`, "error");
            }
        }

        async function stopScanner() {
            if (html5QrCode) {
                try {
                    await html5QrCode.stop();
                } catch (e) {}
                html5QrCode = null;
            }
            document.getElementById('scannerContainer').classList.add('hidden');
        }

        function validateButtons() {
            // Production
            const pSku = document.getElementById('prod-sku').value;
            const pSn = document.getElementById('prod-sn').value;
            const pBtn = document.getElementById('btn-submit-production');
            if (pSku && pSn) {
                pBtn.disabled = false;
                pBtn.classList.replace('bg-slate-700', 'bg-orange-600');
                pBtn.classList.replace('text-slate-500', 'text-white');
            }

            // Shipping
            const sOrder = document.getElementById('ship-order').value;
            const sSn = document.getElementById('ship-sn').value;
            const sBtn = document.getElementById('btn-submit-shipping');
            if (sOrder && sSn) {
                sBtn.disabled = false;
                sBtn.classList.replace('bg-slate-700', 'bg-orange-600');
                sBtn.classList.replace('text-slate-500', 'text-white');
            }

            // Restock
            const rSku = document.getElementById('restock-sku').value;
            const rBtn = document.getElementById('btn-submit-restock');
            if (rSku) {
                rBtn.disabled = false;
                rBtn.classList.replace('bg-slate-700', 'bg-orange-600');
                rBtn.classList.replace('text-slate-500', 'text-white');
            }
        }

        async function submitProduction() {
            const payload = {
                action: 'Production',
                sku: document.getElementById('prod-sku').value,
                serial: document.getElementById('prod-sn').value,
                token: document.getElementById('apiToken').value.trim()
            };
            await transmit(payload, () => {
                document.getElementById('prod-sku').value = "";
                document.getElementById('prod-sn').value = "";
                validateButtons();
            });
        }

        async function submitShipping() {
            const payload = {
                action: 'Shipping',
                orderId: document.getElementById('ship-order').value,
                serial: document.getElementById('ship-sn').value,
                token: document.getElementById('apiToken').value.trim()
            };
            await transmit(payload, () => {
                document.getElementById('ship-order').value = "";
                document.getElementById('ship-sn').value = "";
                validateButtons();
            });
        }

        async function submitRestock() {
            const payload = {
                action: 'Restock',
                sku: document.getElementById('restock-sku').value,
                quantity: document.getElementById('restock-qty').value,
                token: document.getElementById('apiToken').value.trim()
            };
            await transmit(payload, () => {
                document.getElementById('restock-sku').value = "";
                validateButtons();
            });
        }

        async function transmit(payload, onSuccess) {
            const url = document.getElementById('scriptUrl').value.trim();
            showStatus("TRANSMITTING DATA...", "processing");

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                const resJson = await response.json();
                if (resJson.success) {
                    showStatus("SUCCESS: REGISTRY UPDATED", "success");
                    onSuccess();
                } else {
                    showStatus(`ERROR: ${resJson.message}`, "error");
                }
            } catch (error) {
                showStatus("NETWORK ERROR - TRY AGAIN", "error");
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.innerText = msg.toUpperCase();
            el.classList.remove('hidden', 'text-orange-500', 'text-green-500', 'text-red-500', 'border-orange-500', 'border-green-500', 'border-red-500', 'bg-orange-500/5', 'bg-green-500/5', 'bg-red-500/5');

            if (type === 'success') {
                el.classList.add('text-green-500', 'border-green-500', 'bg-green-500/5');
            } else if (type === 'error') {
                el.classList.add('text-red-500', 'border-red-500', 'bg-red-500/5');
            } else {
                el.classList.add('text-orange-500', 'border-orange-500', 'bg-orange-500/5');
            }
            el.classList.remove('hidden');
        }
    </script>
</body>
</html>
