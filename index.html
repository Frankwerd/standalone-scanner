<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Inventory - Standalone Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        .scan-region-highlight { border: 2px solid #f97316 !important; border-radius: 1rem !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-xl mx-auto space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-black tracking-tighter text-orange-500 uppercase italic">Kinetic</h1>
            <p class="text-[10px] text-slate-400 font-bold tracking-[0.3em] uppercase">Inventory API Terminal // Standalone</p>
        </header>

        <!-- Config Section -->
        <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl space-y-4">
            <button onclick="toggleConfig()" class="w-full flex items-center justify-between text-slate-400 hover:text-orange-500 transition-colors">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">settings</span>
                    <h2 class="text-[10px] font-black uppercase tracking-widest">Configuration</h2>
                </div>
                <span id="configChevron" class="material-symbols-outlined transition-transform">expand_more</span>
            </button>
            <div id="configContent" class="hidden space-y-3 pt-2">
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Google Script URL</label>
                    <input type="url" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec"
                           class="w-full bg-slate-900 border-none rounded-lg p-3 text-xs focus:ring-1 focus:ring-orange-500 transition-all outline-none">
                </div>
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">OMS API Token</label>
                    <input type="password" id="apiToken" placeholder="Enter Token..."
                           class="w-full bg-slate-900 border-none rounded-lg p-3 text-xs focus:ring-1 focus:ring-orange-500 transition-all outline-none">
                </div>
            </div>
        </div>

        <!-- Scanner UI -->
        <div class="relative group">
            <div id="reader" class="rounded-3xl overflow-hidden border-2 border-slate-700 bg-black shadow-2xl aspect-square"></div>
            <div id="readerPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-800 rounded-3xl border-2 border-dashed border-slate-600">
                <span class="material-symbols-outlined text-5xl text-slate-600 mb-4">videocam_off</span>
                <button onclick="startScanner()" class="bg-orange-600 hover:bg-orange-500 text-white px-8 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-lg transition-all active:scale-95">
                    Initialize Camera
                </button>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls" class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Action</label>
                    <select id="scanAction" class="w-full bg-slate-900 border-none rounded-xl p-4 text-sm font-bold text-orange-500 focus:ring-1 focus:ring-orange-500 outline-none cursor-pointer appearance-none">
                        <option value="Production">🏭 Production</option>
                        <option value="Shipping">📦 Shipping</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Quantity</label>
                    <input type="number" id="scanQty" value="1" min="1"
                           class="w-full bg-slate-900 border-none rounded-xl p-4 text-sm font-bold focus:ring-1 focus:ring-orange-500 outline-none text-center">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Manual SKU Entry</label>
                <div class="flex gap-2">
                    <input type="text" id="manualSku" placeholder="WAITING FOR SCAN..."
                           class="flex-1 bg-slate-900 border-none rounded-xl p-4 text-sm font-mono tracking-wider focus:ring-1 focus:ring-orange-500 outline-none uppercase placeholder:text-slate-700">
                    <button onclick="handleManualSubmit()" class="bg-slate-700 hover:bg-slate-600 text-white px-6 rounded-xl font-black text-xs uppercase tracking-widest transition-all">Submit</button>
                </div>
            </div>
        </div>

        <!-- Status Panel -->
        <div id="status" class="text-center p-5 rounded-2xl bg-slate-800 border-2 border-transparent text-[11px] font-black tracking-[0.2em] hidden shadow-inner"></div>

        <!-- Troubleshooting -->
        <div id="troubleshooting" class="p-6 bg-red-900/10 border border-red-900/30 rounded-2xl space-y-4 hidden animate-pulse">
            <div class="flex items-center gap-2 text-red-500 font-black text-[10px] uppercase tracking-widest">
                <span class="material-symbols-outlined text-sm">warning</span>
                <span>System Diagnosis Required</span>
            </div>
            <ul class="text-[10px] text-slate-400 space-y-2 list-none px-1">
                <li class="flex gap-2"><span class="text-red-500">01.</span> Logout of secondary Google accounts.</li>
                <li class="flex gap-2"><span class="text-red-500">02.</span> Check Safari > Settings > Camera: "Allow".</li>
                <li class="flex gap-2"><span class="text-red-500">03.</span> Use Incognito/Private mode.</li>
            </ul>
        </div>
    </div>

    <script>
        let html5QrCode = null;

        window.onload = () => {
            // Priority 1: URL Parameters (Auto-Config)
            const params = new URLSearchParams(window.location.search);
            const paramUrl = params.get('url');
            const paramToken = params.get('token');

            if (paramUrl) localStorage.setItem('kinetic_script_url', paramUrl);
            if (paramToken) localStorage.setItem('kinetic_api_token', paramToken);

            // Priority 2: Local Storage
            const savedUrl = localStorage.getItem('kinetic_script_url');
            const savedToken = localStorage.getItem('kinetic_api_token');

            if (savedUrl) document.getElementById('scriptUrl').value = savedUrl;
            if (savedToken) document.getElementById('apiToken').value = savedToken;

            if (savedUrl && savedToken) {
                toggleConfig(false);
                // If we got parameters, auto-start the scanner
                if (paramUrl || paramToken) {
                    showStatus("AUTO-CONFIG LOADED", "success");
                    startScanner();
                }
            } else {
                toggleConfig(true);
            }
        };

        function toggleConfig(force) {
            const content = document.getElementById('configContent');
            const chevron = document.getElementById('configChevron');
            const isHidden = force !== undefined ? !force : !content.classList.contains('hidden');

            if (isHidden) {
                content.classList.add('hidden');
                chevron.style.transform = 'rotate(0deg)';
            } else {
                content.classList.remove('hidden');
                chevron.style.transform = 'rotate(180deg)';
            }
        }

        async function startScanner() {
            const url = document.getElementById('scriptUrl').value.trim();
            const token = document.getElementById('apiToken').value.trim();

            if (!url || !token) {
                showStatus("ERROR: CONFIG REQUIRED BEFORE SCANNING", "error");
                toggleConfig(true);
                return;
            }

            document.getElementById('readerPlaceholder').classList.add('hidden');
            html5QrCode = new Html5Qrcode("reader");

            // Optimized for Code 128 (linear barcodes)
            const config = {
                fps: 20,
                qrbox: { width: 300, height: 150 }, // Wider and shorter for linear barcodes
                aspectRatio: 1.0,
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.QR_CODE,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.EAN_13
                ]
            };

            const onSuccess = (decodedText) => {
                document.getElementById('manualSku').value = decodedText;
                if (navigator.vibrate) navigator.vibrate(100);
                submitScan(decodedText);
            };

            try {
                document.getElementById('controls').scrollIntoView({ behavior: 'smooth' });
                // Multi-stage fallback
                try {
                    await html5QrCode.start({ facingMode: { exact: "environment" } }, config, onSuccess);
                } catch (e) {
                    try {
                        await html5QrCode.start({ facingMode: "environment" }, config, onSuccess);
                    } catch (e2) {
                        await html5QrCode.start({ facingMode: "user" }, config, onSuccess);
                    }
                }
            } catch (err) {
                showStatus(`CAMERA ERROR: ${err.message}`, "error");
                document.getElementById('readerPlaceholder').classList.remove('hidden');
                document.getElementById('troubleshooting').classList.remove('hidden');
            }
        }

        function handleManualSubmit() {
            const sku = document.getElementById('manualSku').value.trim();
            if (!sku) return showStatus("ERROR: SKU REQUIRED", "error");
            submitScan(sku);
        }

        async function submitScan(sku) {
            const url = document.getElementById('scriptUrl').value.trim();
            const token = document.getElementById('apiToken').value.trim();
            const action = document.getElementById('scanAction').value;
            const qty = document.getElementById('scanQty').value || 1;

            if (!url || !token) {
                showStatus("ERROR: CONFIG MISSING", "error");
                toggleConfig(true);
                return;
            }

            localStorage.setItem('kinetic_script_url', url);
            localStorage.setItem('kinetic_api_token', token);

            showStatus(`PROCESSING: ${sku}...`, "processing");

            try {
                    // Use standard fetch without no-cors first to see if we can get a response.
                    // Google Apps Script usually requires a redirect (302) follow.
                const response = await fetch(url, {
                    method: 'POST',
                        headers: { 'Content-Type': 'text/plain' }, // Using text/plain to stay as 'simple request'
                    body: JSON.stringify({
                        sku: sku,
                        action: action,
                        token: token,
                        quantity: parseFloat(qty)
                    })
                });

                    if (response.type === 'opaque') {
                        showStatus(`TRANSMITTED: ${sku} (NO-CORS MODE)`, "success");
                    } else {
                        const resJson = await response.json();
                        if (resJson.success) {
                            showStatus(`SUCCESS: ${sku} UPDATED`, "success");
                        } else {
                            showStatus(`ERROR: ${resJson.message}`, "error");
                        }
                    }
                document.getElementById('manualSku').value = "";
            } catch (error) {
                    console.error("Submission error:", error);
                    // Fallback for no-cors if standard fails
                    try {
                        await fetch(url, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({
                                sku: sku,
                                action: action,
                                token: token,
                                quantity: parseFloat(qty)
                            })
                        });
                        showStatus(`TRANSMITTED: ${sku}`, "success");
                        document.getElementById('manualSku').value = "";
                    } catch (innerError) {
                        showStatus("NETWORK ERROR", "error");
                    }
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.innerText = msg.toUpperCase();
            el.classList.remove('hidden', 'text-orange-500', 'text-green-500', 'text-red-500', 'border-orange-500', 'border-green-500', 'border-red-500', 'bg-orange-500/5', 'bg-green-500/5', 'bg-red-500/5');

            if (type === 'success') {
                el.classList.add('text-green-500', 'border-green-500', 'bg-green-500/5');
            } else if (type === 'error') {
                el.classList.add('text-red-500', 'border-red-500', 'bg-red-500/5');
            } else {
                el.classList.add('text-orange-500', 'border-orange-500', 'bg-orange-500/5');
            }
            el.classList.remove('hidden');
        }
    </script>
</body>
</html>
